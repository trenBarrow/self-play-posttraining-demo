    networks:
      fprime_real_net:
        ipv4_address: 192.168.144.13
    restart: unless-stopped

  ops_b1:
    image: nasafprime/fprime-arm:latest
    platform: linux/amd64
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-lc"]
    command: ["sleep infinity"]
