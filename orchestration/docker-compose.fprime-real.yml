      fprime_real_net:
        ipv4_address: 192.168.144.22
    restart: unless-stopped

  ops_b2:
    image: nasafprime/fprime-arm:latest
    platform: linux/amd64
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-lc"]
    command: ["sleep infinity"]
