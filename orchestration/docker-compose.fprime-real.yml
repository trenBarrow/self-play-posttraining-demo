        ipv4_address: 192.168.144.23
    restart: unless-stopped

  red_a1:
    image: nasafprime/fprime-arm:latest
    platform: linux/amd64
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-lc"]
    command: ["sleep infinity"]
    volumes:
      - ..:/workspace
      - ${FPRIME_RUNTIME_HOST_ROOT:-../gds/fprime_runtime}:/runtime_root
    networks:
      fprime_real_net:
        ipv4_address: 192.168.144.31
    restart: unless-stopped

  red_a2:
